name: SS.LV Property Monitor

on:
  schedule:
    # Katru rītu 08:00 Rīgas laiks (UTC+2 vasarā = UTC 06:00)
    - cron: '0 6 * * *'
  workflow_dispatch:
    # Ļauj palaist manuāli no GitHub UI

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout kods
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalē dependencies
        run: pip install requests beautifulsoup4

      - name: Palaiž monitoru
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ss_monitor.py
